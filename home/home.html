<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="py-5 bg-white">
      <nav class="flex flex-col sm:flex-row gap-3 justify-between items-center w-[95%] md:w-11/12 mx-auto">
        <div class="flex justify-center items-center gap-1">
          <img src="../assets/github-logo.png" alt="github" class="w-10" />
          <h1 class="text-lg md:text-2xl font-semibold heading-color">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="join">
          <div>
            <label class="input">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="search" required placeholder="Search issues..." />
            </label>
            <div class="validator-hint hidden">Enter valid email address</div>
          </div>
          <button class="btn btn-primary join-item">Search</button>
        </div>
      </nav>
    </header>
    <main class="w-10/12 mx-auto py-5 min-h-[100vh]">
      <section
        id="category-btn-container"
        class="flex gap-3 justify-center md:justify-start sm:gap-5 bg-white rounded-md shadow-md p-5"
      >
        <button
          class="btn btn-primary category-btn all"
          id="all"
          onclick="loadCategoryIssues('all')"
        >
          All</button
        ><button
          class="btn category-btn"
          id="open"
          onclick="loadCategoryIssues('open')"
        >
          Open</button
        ><button
          class="btn category-btn"
          id="colsed"
          onclick="loadCategoryIssues('closed')"
        >
          Closed
        </button>
      </section>
      <section id="cards-section" class="">
        <div
          class="card-header flex flex-col sm:flex-row justify-between items-center shadow-sm my-5 p-5 bg-white rounded-md gap-4"
        >
          <div class="flex justify-between items-center gap-2">
            <img
              src="../assets/Aperture.png"
              alt="Aperture"
              class="h-10 w-10 p-1 rounded-full bg-gray-200"
            />
            <div>
              <h5 id="issue-count" class="heading-color text-lg font-semibold">
                50 Issues
              </h5>
              <p class="p-color text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex justify-between items-center gap-14">
            <p class="indicator">Open</p>
            <p class="indicator">Closed</p>
          </div>
        </div>
        <!-- cards container -->
        <div id="loader" class="h-[50vh] flex justify-center items-center hidden"><span class="loading loading-dots loading-xl"></span></div>
        <div
          id="cards-container"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-5"
        ></div>
        <!-- Open the modal using ID.showModal() method -->
        <dialog
          id="issueDetailsModal"
          class="modal modal-bottom sm:modal-middle"
        >
          <div class="modal-box">
            <div id="detail" class="space-y-3">
              
            </div>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>

    <!-- scripted section -->
    <script src="app.js"></script>
  </body>
</html>
